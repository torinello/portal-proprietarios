<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holiday Stays · Portal do Proprietário</title>
  <meta property="og:title" content="Holiday Stays · Portal do Proprietário" />
  <meta property="og:description" content="Acesse as informações do seu imóvel" />
  <meta property="og:image" content="https://portal.holidaystays.online/logo.png" />
  <meta property="og:url" content="https://portal.holidaystays.online" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #2AADA4; --teal-dark: #1E8A84; --teal-light: #E6F5F4;
      --black: #1A1A1A; --muted: #6B7A7A; --border: #C8E0DE;
      --bg: #F2F8F8; --white: #FFFFFF;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: var(--white); border-bottom: 3px solid var(--teal);
      padding: 28px 20px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      box-shadow: 0 2px 12px rgba(42,173,164,.12);
    }
    header img { height: 72px; object-fit: contain; }
    header h1 { font-size: 1rem; font-weight: 600; color: var(--teal-dark); }
    header p { font-size: .78rem; color: var(--muted); }
    .container { max-width: 620px; margin: 40px auto 0; padding: 0 20px; flex: 1; }
    .section-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 14px; }
    .owner-card {
      background: var(--white); border-radius: 12px;
      box-shadow: 0 2px 10px rgba(42,173,164,.10);
      overflow: hidden; margin-bottom: 14px;
      text-decoration: none; display: block;
      transition: transform .15s, box-shadow .15s;
    }
    .owner-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(42,173,164,.16); }
    .owner-card-inner { display: flex; align-items: center; gap: 16px; padding: 18px 20px; }
    .owner-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--teal); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; flex-shrink: 0;
    }
    .owner-info { flex: 1; }
    .owner-info .name { font-size: .98rem; font-weight: 700; color: var(--black); }
    .owner-info .meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }
    .owner-arrow { color: var(--teal); font-size: 1.1rem; }
    .apto-pills { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 20px 16px; }
    .apto-pill {
      background: var(--teal-light); color: var(--teal-dark);
      border-radius: 999px; padding: 4px 12px;
      font-size: .73rem; font-weight: 600; letter-spacing: .3px;
    }
    footer { text-align: center; color: var(--muted); font-size: .75rem; padding: 30px 20px; }
    footer a { color: var(--teal); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Holiday Stays" onerror="this.style.display='none'" />
    <h1>Portal do Proprietário</h1>
    <p>Selecione o proprietário para acessar as informações</p>
  </header>
  <div class="container">
    <div class="section-title">Proprietários</div>
    <div id="lista"></div>
  </div>
  <footer>
    📞 <a href="tel:+558535145116">(85) 3514-5116</a> &nbsp;|&nbsp;
    📱 <a href="https://wa.me/558535145116">WhatsApp</a> &nbsp;|&nbsp;
    ✉️ <a href="mailto:info@bookingfortaleza.com">info@bookingfortaleza.com</a>
    <p style="margin-top:8px; color:#B0BEC5;">© Holiday Stays · Grupo Booking Fortaleza LTDA</p>
  </footer>
  <script src="proprietarios.js"></script>
  <script>
    const lista = document.getElementById('lista');
    Object.entries(PROPRIETARIOS).forEach(([slug, p]) => {
      const qtd = p.imoveis.length;
      const pills = p.imoveis.map(i => `<span class="apto-pill">${i.codigo} · ${i.nome}</span>`).join('');
      lista.innerHTML += `
        <a class="owner-card" href="proprietario/${slug}">
          <div class="owner-card-inner">
            <div class="owner-avatar">${p.nome.charAt(0).toUpperCase()}</div>
            <div class="owner-info">
              <div class="name">${p.nome}</div>
              <div class="meta">${qtd} imóvel${qtd > 1 ? 'eis' : ''} cadastrado${qtd > 1 ? 's' : ''}</div>
            </div>
            <div class="owner-arrow">→</div>
          </div>
          <div class="apto-pills">${pills}</div>
        </a>`;
    });
  </script>
</body>
</html>
