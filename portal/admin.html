<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Portal Holiday Stays</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #2AADA4; --teal-dark: #1E8A84; --teal-deeper: #156460;
    --teal-light: #E6F5F4; --black: #1A1A1A; --muted: #6B7A7A;
    --border: #C8E0DE; --bg: #F2F8F8; --white: #FFFFFF;
    --radius: 12px; --shadow: 0 2px 10px rgba(42,173,164,.10);
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }
  header { background: var(--white); padding: 22px 32px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 2px 12px rgba(42,173,164,.12); border-bottom: 3px solid var(--teal); }
  header img { height: 60px; object-fit: contain; }
  header h1 { font-size: 1rem; font-weight: 700; color: var(--teal-dark); }

  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 20px; display: flex; flex-direction: column; gap: 18px; }
  .wrap > p { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 10px; }

  .option-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 26px;
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: var(--black);
    transition: transform .15s ease, box-shadow .15s ease;
    border: 2px solid transparent;
  }
  .option-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(42,173,164,.18); border-color: var(--teal); }
  .option-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--teal-light); color: var(--teal-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
  }
  .option-text h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .option-text p { font-size: .85rem; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Holiday Stays" onerror="this.style.display='none'" />
    <h1>🔐 Painel Administrativo</h1>
  </header>

  <div class="wrap">
    <p>Escolha o que você quer fazer</p>

    <a class="option-card" href="/admin-lista">
      <div class="option-icon">📋</div>
      <div class="option-text">
        <h2>Ver proprietários</h2>
        <p>Consultar e copiar os links de acesso de quem já está cadastrado</p>
      </div>
    </a>

    <a class="option-card" href="/admin-cadastro">
      <div class="option-icon">➕</div>
      <div class="option-text">
        <h2>Cadastrar proprietário</h2>
        <p>Adicionar um novo proprietário — os dados são comitados automaticamente</p>
      </div>
    </a>
  </div>
</body>
</html>
