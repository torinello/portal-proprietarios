<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Portal Holiday Stays</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #2AADA4; --teal-dark: #1E8A84; --teal-deeper: #156460;
      --teal-light: #E6F5F4; --black: #1A1A1A; --muted: #6B7A7A;
      --border: #C8E0DE; --bg: #F2F8F8; --white: #FFFFFF;
      --radius: 12px; --shadow: 0 2px 10px rgba(42,173,164,.10);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }
    header { background: var(--white); padding: 22px 32px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 2px 12px rgba(42,173,164,.12); border-bottom: 3px solid var(--teal); }
    header img { height: 60px; object-fit: contain; }
    header h1 { font-size: 1rem; font-weight: 700; color: var(--teal-dark); }

    /* LOGIN */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 120px); padding: 20px; }
    .login-box { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px 32px; width: 100%; max-width: 380px; text-align: center; }
    .login-box h2 { font-size: 1.1rem; font-weight: 700; color: var(--teal-dark); margin-bottom: 6px; }
    .login-box p { font-size: .82rem; color: var(--muted); margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 9px; font-size: .95rem; font-family: inherit; outline: none; transition: border .2s; }
    .login-box input:focus { border-color: var(--teal); }
    .login-box button { width: 100%; margin-top: 14px; padding: 13px; background: var(--teal); color: #fff; border: none; border-radius: 9px; font-size: .95rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    .login-box button:hover { background: var(--teal-dark); }
    .login-error { color: #e53e3e; font-size: .82rem; margin-top: 10px; display: none; }

    /* ADMIN */
    .admin-wrap { max-width: 760px; margin: 0 auto; padding: 30px 20px 60px; display: none; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .admin-header h2 { font-size: 1rem; font-weight: 700; color: var(--teal-dark); }
    .admin-header span { font-size: .8rem; color: var(--muted); }
    .prop-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
    .prop-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .prop-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--teal); color: #fff; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .prop-info { flex: 1; }
    .prop-info .prop-nome { font-size: 1rem; font-weight: 700; }
    .prop-info .prop-imoveis { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .prop-body { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
    .link-row { display: flex; align-items: center; gap: 10px; background: var(--teal-light); border-radius: 9px; padding: 11px 14px; }
    .link-row .link-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--teal-deeper); min-width: 70px; flex-shrink: 0; }
    .link-row .link-url { flex: 1; font-size: .88rem; font-weight: 500; color: var(--black); word-break: break-all; }
    .link-row a { font-size: .8rem; color: var(--teal-dark); text-decoration: none; font-weight: 600; flex-shrink: 0; }
    .link-row a:hover { text-decoration: underline; }
    .copy-link-btn { background: var(--teal); color: #fff; border: none; border-radius: 7px; padding: 6px 12px; font-size: .78rem; font-weight: 700; cursor: pointer; flex-shrink: 0; font-family: inherit; transition: background .15s; }
    .copy-link-btn:hover { background: var(--teal-dark); }
    .imovel-tag { display: inline-block; background: var(--border); border-radius: 6px; padding: 3px 10px; font-size: .75rem; font-weight: 600; color: var(--teal-deeper); margin: 2px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1C2B3A; color: #fff; padding: 10px 22px; border-radius: 999px; font-size: .85rem; font-weight: 600; transition: transform .25s ease; z-index: 999; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    @media (max-width: 500px) { .admin-wrap { padding: 20px 14px 60px; } .link-row { flex-wrap: wrap; } }

    .nav-bar { display: flex; justify-content: center; gap: 6px; background: var(--white); padding: 10px; border-bottom: 1px solid var(--border); }
    .nav-bar a { text-decoration: none; font-size: .82rem; font-weight: 600; color: var(--muted); padding: 7px 14px; border-radius: 8px; transition: background .15s, color .15s; }
    .nav-bar a:hover { background: var(--teal-light); color: var(--teal-dark); }
    .nav-bar a.active { background: var(--teal-light); color: var(--teal-dark); }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Holiday Stays" onerror="this.style.display='none'" />
    <h1>🔐 Painel Administrativo</h1>
  </header>

  <nav class="nav-bar">
    <a href="/admin">🏠 Painel</a>
    <a href="/admin-lista" class="active">📋 Ver proprietários</a>
    <a href="/admin-cadastro">➕ Cadastrar proprietário</a>
  </nav>

  <div class="login-wrap" id="login-wrap">
    <div class="login-box">
      <h2>Acesso Restrito</h2>
      <p>Digite a senha para acessar o painel</p>
      <input type="password" id="senha-input" placeholder="Senha" onkeydown="if(event.key==='Enter') verificarSenha()" />
      <button onclick="verificarSenha()">Entrar</button>
      <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
    </div>
  </div>

  <div class="admin-wrap" id="admin-wrap">
    <div class="admin-header">
      <h2>Proprietários cadastrados</h2>
      <span id="total-label"></span>
    </div>
    <div id="lista-props"></div>
  </div>

  <div class="toast" id="toast">✓ Link copiado!</div>

  <script src="proprietarios.js"></script>
  <script>
    const SENHA_ADMIN = "HolidayStays2026";
    const BASE_URL = "https://portal.holidaystays.online/";

    function verificarSenha() {
      const input = document.getElementById('senha-input').value;
      if (input === SENHA_ADMIN) {
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('admin-wrap').style.display = 'block';
        renderAdmin();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('senha-input').value = '';
        document.getElementById('senha-input').focus();
      }
    }

    function renderAdmin() {
      const lista = document.getElementById('lista-props');
      const keys = Object.keys(PROPRIETARIOS);
      document.getElementById('total-label').textContent = `${keys.length} proprietário${keys.length !== 1 ? 's' : ''}`;

      keys.forEach(slug => {
        const p = PROPRIETARIOS[slug];
        const link = BASE_URL + slug;
        const imovelTags = p.imoveis.map(im => `<span class="imovel-tag">${im.codigo} · ${im.nome}</span>`).join('');

        const card = document.createElement('div');
        card.className = 'prop-card';
        card.innerHTML = `
          <div class="prop-header">
            <div class="prop-avatar">${p.nome.charAt(0)}</div>
            <div class="prop-info">
              <div class="prop-nome">${p.nome}</div>
              <div class="prop-imoveis">${p.imoveis.length} imóvel${p.imoveis.length !== 1 ? 'eis' : ''}: ${imovelTags}</div>
            </div>
          </div>
          <div class="prop-body">
            <div class="link-row">
              <span class="link-label">Link</span>
              <span class="link-url">${link}</span>
              <a href="${link}" target="_blank">Abrir ↗</a>
              <button class="copy-link-btn" onclick="copiarLink('${link}')">📋 Copiar</button>
            </div>
          </div>`;
        lista.appendChild(card);
      });
    }

    function copiarLink(link) {
      navigator.clipboard.writeText(link).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
      });
    }
  </script>
</body>
</html>
